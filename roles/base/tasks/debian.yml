---
# Tasks for Debian

- name: Install extra keys
  ansible.builtin.apt_key:
    url: "{{ item }}"
  loop: "{{ extra_keys }}"
  when: "extra_keys | length > 0"

- name: Install extra repositories
  ansible.builtin.apt_repository: "{{ item }}"
  loop: "{{ extra_repos }}"
  when: "extra_repos | length > 0"

- name: Install base packages
  ansible.builtin.apt:
    name:
      - autofs
      - bash-completion
      - curl
      - git
      - htop
      - iftop
      - iotop
      - jq
      - lsof
      - netcat-openbsd
      - openssh-server
      - postfix
      - psmisc
      - python3-pip
      - rclone
      - rsync
      - sudo
      - tmux
      - unattended-upgrades
      - unzip
      - vim
      - wget
      - zip
    state: present

- name: Install extra packages
  ansible.builtin.apt:
    name: "{{ extra_packages }}"
    state: present
  when: "extra_packages | length > 0"

- name: Disable unattended-upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    src: /usr/share/unattended-upgrades/20auto-upgrades-disabled
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  when: "not auto_update_enabled"

- name: Enable unattended-upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    src: /usr/share/unattended-upgrades/20auto-upgrades
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  when: "auto_update_enabled"
