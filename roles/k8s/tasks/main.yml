### Container tools

- name: Create containers storage directory
  ansible.builtin.file:
    path: "{{ containers_storage_dir }}"
    owner: root
    group: root
    mode: "0700"
    state: directory

- name: Configure containers storage
  ansible.builtin.template:
    src: crio.conf.j2
    dest: "/etc/crio/crio.conf.d/99-custom.conf"
    owner: root
    group: root
    mode: "0644"

- name: Configure containers policy
  ansible.builtin.copy:
    dest: /etc/containers/policy.json
    content: "{\"default\":[{\"type\":\"insecureAcceptAnything\"}]}"
    owner: root
    group: root
    mode: "0644"


### System

- name: Load br_netfilter kernel module
  community.general.modprobe:
    name: br_netfilter
  when: "not skip_modprobe"

- name: Configure br_netfilter kernel module
  ansible.builtin.copy:
    dest: /etc/modules-load.d/br_netfilter.conf
    content: "br_netfilter"
    owner: root
    group: root
    mode: "0644"
  when: "not skip_modprobe"

- name: Configure sysctl
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: "1"
  loop:
    - net.ipv4.ip_forward
    - net.bridge.bridge-nf-call-iptables
    - net.bridge.bridge-nf-call-ip6tables
  when: "not skip_sysctl"

- name: Check if SELinux config exists
  ansible.builtin.stat:
    path: /etc/selinux/config
  register: selinux_config_file

- name: Disable SELinux
  ansible.posix.selinux:
    state: disabled
  when: "selinux_config_file.stat.exists"

- name: Enable services
  ansible.builtin.service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - crio
    - kubelet
  when: "not skip_services"


### kubeadm & kubelet

- name: Create kubelet directory
  ansible.builtin.file:
    path: /var/lib/kubelet
    owner: root
    group: root
    mode: "0700"
    state: directory

- name: Configure registry authentication
  ansible.builtin.copy:
    dest: /var/lib/kubelet/config.json
    content: "{\"auths\": {{ vault_k8s_registry_auths | to_json }}}"
    owner: root
    group: root
    mode: "0600"

- name: Check if kubelet config exists
  ansible.builtin.stat:
    path: /var/lib/kubelet/config.yaml
  register: kubelet_config_file

- name: Init cluster as master
  ansible.builtin.command: "kubeadm init --node-name={{ k8s_node_name }} --cri-socket=unix:///var/run/crio/crio.sock --pod-network-cidr={{ k8s_pod_cidr }} --service-cidr={{ k8s_service_cidr }} --control-plane-endpoint={{ k8s_master_host }}:{{ k8s_master_port }} --upload-certs"
  when: "not kubelet_config_file.stat.exists and k8s_node_role == 'master'"

- name: Join cluster as control plane
  ansible.builtin.command: "kubeadm join --node-name={{ k8s_node_name }} --cri-socket=unix:///var/run/crio/crio.sock --token {{ k8s_join_token }} {{ k8s_master_host }}:{{ k8s_master_port }} --discovery-token-ca-cert-hash sha256:{{ k8s_cert_hash }} --control-plane --certificate-key {{ k8s_cert_key }}"
  when: "not kubelet_config_file.stat.exists and k8s_node_role == 'controlplane' and k8s_join_token|length > 0 and k8s_cert_hash|length > 0 and k8s_cert_key|length > 0"

- name: Join cluster as worker
  ansible.builtin.command: "kubeadm join --node-name={{ k8s_node_name }} --cri-socket=unix:///var/run/crio/crio.sock --token {{ k8s_join_token }} {{ k8s_master_host }}:{{ k8s_master_port }} --discovery-token-ca-cert-hash sha256:{{ k8s_cert_hash }}"
  when: "not kubelet_config_file.stat.exists and k8s_node_role == 'worker' and k8s_join_token|length > 0 and k8s_cert_hash|length > 0"

- name: Check if kubectl admin config exists
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubectl_config_file

- name: Create kubectl config directory for root
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: "kubectl_config_file.stat.exists"

- name: Copy kubectl config for root
  ansible.builtin.copy:
    dest: /root/.kube/config
    src: /etc/kubernetes/admin.conf
    remote_src: true
    owner: root
    group: root
    mode: "0600"
  when: "kubectl_config_file.stat.exists"

- name: Allow control plane to schedule pods (master taint)
  ansible.builtin.command: "kubectl taint nodes {{ k8s_node_name }} node-role.kubernetes.io/master-"
  ignore_errors: true
  when: "kubectl_config_file.stat.exists and (k8s_node_role == 'master' or k8s_node_role == 'controlplane')"

- name: Allow control plane to schedule pods (control-plane taint)
  ansible.builtin.command: "kubectl taint nodes {{ k8s_node_name }} node-role.kubernetes.io/control-plane-"
  ignore_errors: true
  when: "kubectl_config_file.stat.exists and (k8s_node_role == 'master' or k8s_node_role == 'controlplane')"

- name: Configure node labels
  ansible.builtin.command: "kubectl label --overwrite nodes {{ k8s_node_name }} {{ k8s_node_labels }}"
  when: "kubectl_config_file.stat.exists and k8s_node_labels|length > 0"

- name: Configure node taints
  ansible.builtin.command: "kubectl taint --overwrite nodes {{ k8s_node_name }} {{ k8s_node_taints }}"
  when: "kubectl_config_file.stat.exists and k8s_node_taints|length > 0"
