### etcd

- name: Check etcd CLI version
  ansible.builtin.shell: etcdctl version | grep 'etcdctl version:' | egrep -o '[0-9.]+'
  register: etcdctl_version_check
  check_mode: false
  ignore_errors: true
  changed_when: false

- name: Download etcd CLI
  ansible.builtin.get_url:
    url: https://github.com/etcd-io/etcd/releases/download/v{{ etcd_version }}/etcd-v{{ etcd_version }}-linux-amd64.tar.gz
    dest: /tmp/etcd-v{{ etcd_version }}-linux-amd64.tar.gz
    checksum: "{{ etcd_checksum }}"
    owner: root
    group: root
    mode: "0644"
  when: "etcdctl_version_check.rc != 0 or etcdctl_version_check.stdout != etcd_version"

- name: Install etcd CLI
  ansible.builtin.unarchive:
    src: /tmp/etcd-v{{ etcd_version }}-linux-amd64.tar.gz
    dest: /usr/local/bin
    remote_src: true
    owner: root
    group: root
    mode: "0755"
    extra_opts: ['--strip-components=1', '--show-stored-names', 'etcd-v{{ etcd_version }}-linux-amd64/etcdctl']
  when: "etcdctl_version_check.rc != 0 or etcdctl_version_check.stdout != etcd_version"

- name: Delete etcd CLI temporary file
  ansible.builtin.file:
    path: /tmp/etcd-v{{ etcd_version }}-linux-amd64.tar.gz
    state: absent
  when: "etcdctl_version_check.rc != 0 or etcdctl_version_check.stdout != etcd_version"


