---
adguard_enabled: true
backuptools_backend: s3
backuptools_enabled: true
cec_api_enabled: true
extra_packages:
  - fake-hwclock
  - nextcloud-desktop-cmd
  - ntfs-3g
firewall_enabled: false
gazpar2haws_enabled: true
homeassistant_enabled: true
minidlna_enabled: false
minidlna_media_dirs: A,/media/FAB-500GB/Musique et sons/Musique:V,/media/FAB-2TB/Videos/Films:V,/media/FAB-2TB/Videos/Series
mounts:
  - path: /media/FAB-500GB
    src: UUID=B4D48115D480DB4E
    fstype: ntfs
    opts: defaults,auto,users,rw,nofail,umask=000,x-systemd.device-timeout=30
  - path: /media/FAB-1TB
    src: UUID=EE7EB0C67EB0893B
    fstype: ntfs
    opts: defaults,auto,users,rw,nofail,umask=000,x-systemd.device-timeout=30
  - path: /media/FAB-2TB
    src: UUID=B2FC78EDFC78ACEB
    fstype: ntfs
    opts: defaults,auto,users,rw,nofail,umask=000,x-systemd.device-timeout=30
openvpn_client_enabled: true
rf433_api_enabled: true
samba_enabled: true
samba_shares: FAB-500GB:/media/FAB-500GB,FAB-1TB:/media/FAB-1TB,FAB-2TB:/media/FAB-2TB
sickgear_downloads_dir: /media/FAB-2TB/Downloads
